name: Auto assign PR author

on:
  issues:
    types: [ opened, reopened ]
  pull_request_target:
    types: [ opened, reopened ]
  workflow_call:
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  assign-author:
    runs-on: ubuntu-latest
    steps:
      - name: Auto assign PR author
        uses: toshimaru/auto-author-assign@v3.0.1
        with:
          repo-token: ${{ github.token }}
