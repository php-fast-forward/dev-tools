name: Generate Reports and Deploy to GitHub Pages

on:
    workflow_call:
    workflow_dispatch:
    pull_request:
        types: [ "opened", "synchronize", "reopened" ]
    push:
        branches: [ "main" ]

permissions:
    contents: write
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    reports:
        name: Generate Reports
        runs-on: ubuntu-latest

        env:
            PAGES_ARTIFACT_NAME: ${{ github.event_name == 'pull_request' && format('github-pages-pr-{0}', github.event.pull_request.number) || 'github-pages' }}
            REPORTS_ROOT_VERSION: ${{ github.event_name == 'pull_request' && format('dev-{0}', github.event.pull_request.head.ref) || 'dev-main' }}

        steps:
            - uses: actions/checkout@v6

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                php-version: '8.3'
                extensions: pcov, pcntl
                coverage: pcov

            - name: Cache Composer dependencies
              uses: actions/cache@v5
              with:
                path: /tmp/composer-cache
                key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
                restore-keys: |
                  ${{ runner.os }}-composer-

            - name: Install dependencies
              env:
                COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ github.token }}"} }'
                COMPOSER_CACHE_DIR: /tmp/composer-cache
                COMPOSER_ROOT_VERSION: ${{ env.REPORTS_ROOT_VERSION }}
              run: composer install --prefer-dist --no-progress --no-interaction --no-scripts

            - name: Mark workspace as safe for git
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

            - name: Generate reports
              env:
                COMPOSER_ROOT_VERSION: ${{ env.REPORTS_ROOT_VERSION }}
              run: composer dev-tools reports

            - name: Fix permissions
              run: |
                chmod -c -R +rX "public/" | while read line; do
                    echo "::warning title=Invalid file permissions automatically fixed::$line"
                done

            - name: Upload artifact
              if: github.event_name != 'pull_request'
              uses: actions/upload-pages-artifact@v5
              with:
                name: ${{ env.PAGES_ARTIFACT_NAME }}
                path: public/

            - name: Upload pull request artifact
              if: github.event_name == 'pull_request'
              uses: actions/upload-pages-artifact@v5
              with:
                name: ${{ env.PAGES_ARTIFACT_NAME }}
                path: public/

            - name: Upload downloadable pull request reports
              if: github.event_name == 'pull_request'
              uses: actions/upload-artifact@v6
              with:
                name: reports-pr-${{ github.event.pull_request.number }}
                path: public/
                retention-days: 14

    deploy:
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

        name: Deploy to GitHub Pages
        needs: reports

        permissions:
            pages: write
            id-token: write

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        runs-on: ubuntu-latest
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
              with:
                artifact_name: github-pages

    preview:
        if: github.event_name == 'pull_request'

        name: Deploy Pull Request Reports Preview
        needs: reports
        continue-on-error: true

        permissions:
            pages: write
            id-token: write

        environment:
            name: github-pages-preview
            url: ${{ steps.deployment.outputs.page_url }}/pr-${{ github.event.pull_request.number }}/

        runs-on: ubuntu-latest
        steps:
            - name: Deploy pull request reports preview
              id: deployment
              uses: actions/deploy-pages@v5
              with:
                artifact_name: github-pages-pr-${{ github.event.pull_request.number }}
                preview: true
