name: Update Wiki

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_target:
    types: [closed]

permissions:
  contents: read

concurrency:
  group: update-wiki-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: '1'

jobs:
  resolve_php:
    name: Resolve PHP Version
    runs-on: ubuntu-latest
    outputs:
      php-version: ${{ steps.resolve.outputs.php-version }}
      php-version-source: ${{ steps.resolve.outputs.php-version-source }}

    steps:
      - uses: actions/checkout@v6

      - name: Resolve workflow PHP version
        id: resolve
        uses: ./.github/actions/php/resolve-version

  preview:
    needs: resolve_php
    name: Update Wiki Preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    env:
      WIKI_PREVIEW_BRANCH: pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          submodules: recursive
          fetch-depth: 0

      - name: Setup PHP and install dependencies
        uses: ./.github/actions/php/setup-composer
        with:
          php-version: ${{ needs.resolve_php.outputs.php-version }}
          root-version: dev-${{ github.event.pull_request.head.ref }}
          safe-directories: |
            ${{ github.workspace }}/.github/wiki

      - name: Prepare wiki preview branch
        uses: ./.github/actions/wiki/prepare-preview-branch
        with:
          preview-branch: ${{ env.WIKI_PREVIEW_BRANCH }}

      - name: Create Docs Markdown
        env:
          COMPOSER_ROOT_VERSION: dev-${{ github.event.pull_request.head.ref }}
        run: composer dev-tools wiki -- --target=.github/wiki

      - name: Commit & push wiki preview branch
        id: wiki_commit
        uses: EndBug/add-and-commit@v10
        with:
          cwd: .github/wiki
          add: .
          message: "Update wiki docs for PR #${{ github.event.pull_request.number }}"
          default_author: github_actions
          push: origin HEAD:${{ env.WIKI_PREVIEW_BRANCH }}

      - name: Check submodule pointer changes
        id: submodule_status
        run: |
          if git diff --quiet -- .github/wiki; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit parent repo submodule pointer
        if: steps.submodule_status.outputs.changed == 'true'
        id: parent_commit
        uses: EndBug/add-and-commit@v10
        with:
          add: .github/wiki
          message: "Update wiki submodule pointer for PR #${{ github.event.pull_request.number }}"
          default_author: github_actions
          pull: "--rebase --autostash"
          push: true

  publish:
    name: Publish Wiki Master
    if: github.event_name == 'pull_request_target' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    env:
      WIKI_PUBLISH_BRANCH: master
      WIKI_PREVIEW_BRANCH: pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          ref: main
          submodules: recursive
          fetch-depth: 0

      - name: Mark workspace as safe for git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/.github/wiki"

      - name: Prepare wiki publish branch from preview branch
        id: prepare_publish
        uses: ./.github/actions/wiki/prepare-publish-branch
        with:
          publish-branch: ${{ env.WIKI_PUBLISH_BRANCH }}
          preview-branch: ${{ env.WIKI_PREVIEW_BRANCH }}

      - name: Push wiki publish branch
        working-directory: .github/wiki
        run: git push --force-with-lease origin HEAD:"${WIKI_PUBLISH_BRANCH}"

      - name: Validate wiki publish branch
        uses: ./.github/actions/wiki/validate-publish-branch
        with:
          publish-branch: ${{ env.WIKI_PUBLISH_BRANCH }}
          preview-branch: ${{ env.WIKI_PREVIEW_BRANCH }}
          expected-preview-sha: ${{ steps.prepare_publish.outputs.expected-preview-sha }}

      - name: Delete wiki preview branch
        uses: ./.github/actions/wiki/delete-preview-branch
        with:
          preview-branch: ${{ env.WIKI_PREVIEW_BRANCH }}

  cleanup_closed_preview:
    name: Delete Closed PR Wiki Preview
    if: github.event_name == 'pull_request_target' && github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      WIKI_PREVIEW_BRANCH: pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          ref: main
          submodules: recursive
          fetch-depth: 0

      - name: Mark wiki workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE/.github/wiki"

      - name: Delete wiki preview branch
        uses: ./.github/actions/wiki/delete-preview-branch
        with:
          preview-branch: ${{ env.WIKI_PREVIEW_BRANCH }}

  cleanup_orphaned_previews:
    name: Delete Orphaned Wiki Previews
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          ref: main
          submodules: recursive
          fetch-depth: 0

      - name: Mark wiki workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE/.github/wiki"

      - name: Delete wiki branches for closed pull requests
        uses: ./.github/actions/wiki/cleanup-orphaned-previews
