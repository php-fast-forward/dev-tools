name: Update Wiki

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_target:
    types: [closed]

permissions:
  contents: read

concurrency:
  group: update-wiki-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  resolve_php:
    name: Resolve PHP Version
    runs-on: ubuntu-latest
    outputs:
      php-version: ${{ steps.resolve.outputs.php-version }}
      php-version-source: ${{ steps.resolve.outputs.php-version-source }}

    steps:
      - uses: actions/checkout@v6

      - name: Resolve workflow PHP version
        id: resolve
        uses: php-fast-forward/dev-tools/.github/actions/resolve-php-version@main

  preview:
    needs: resolve_php
    name: Update Wiki Preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    env:
      WIKI_PREVIEW_BRANCH: pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          submodules: recursive
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ needs.resolve_php.outputs.php-version }}

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: /tmp/composer-cache
          key: ${{ runner.os }}-composer-${{ needs.resolve_php.outputs.php-version }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ needs.resolve_php.outputs.php-version }}-
            ${{ runner.os }}-composer-

      - name: Mark workspace as safe for git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/.github/wiki"

      - name: Install dependencies
        env:
          COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ github.token }}"} }'
          COMPOSER_CACHE_DIR: /tmp/composer-cache
          COMPOSER_ROOT_VERSION: dev-${{ github.event.pull_request.head.ref }}
        run: composer install --prefer-dist --no-progress --no-interaction --no-scripts

      - name: Prepare wiki preview branch
        working-directory: .github/wiki
        run: |
          git fetch origin

          if git ls-remote --exit-code --heads origin "${WIKI_PREVIEW_BRANCH}" >/dev/null 2>&1; then
            git switch -C "${WIKI_PREVIEW_BRANCH}" --track "origin/${WIKI_PREVIEW_BRANCH}"
            git reset --hard "origin/${WIKI_PREVIEW_BRANCH}"
          else
            git switch --orphan "${WIKI_PREVIEW_BRANCH}"
            git rm -rf . >/dev/null 2>&1 || true
            find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          fi

          git clean -fd

      - name: Create Docs Markdown
        env:
          COMPOSER_ROOT_VERSION: dev-${{ github.event.pull_request.head.ref }}
        run: composer dev-tools wiki -- --target=.github/wiki

      - name: Commit & push wiki preview branch
        id: wiki_commit
        uses: EndBug/add-and-commit@v10
        with:
          cwd: .github/wiki
          add: .
          message: "Update wiki docs for PR #${{ github.event.pull_request.number }}"
          default_author: github_actions
          push: origin HEAD:${{ env.WIKI_PREVIEW_BRANCH }}

      - name: Check submodule pointer changes
        id: submodule_status
        run: |
          if git diff --quiet -- .github/wiki; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit parent repo submodule pointer
        if: steps.submodule_status.outputs.changed == 'true'
        id: parent_commit
        uses: EndBug/add-and-commit@v10
        with:
          add: .github/wiki
          message: "Update wiki submodule pointer for PR #${{ github.event.pull_request.number }}"
          default_author: github_actions
          pull: "--rebase --autostash"
          push: true

  publish:
    name: Publish Wiki Master
    if: github.event_name == 'pull_request_target' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    env:
      WIKI_PUBLISH_BRANCH: master
      WIKI_PREVIEW_BRANCH: pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          ref: main
          submodules: recursive
          fetch-depth: 0

      - name: Mark workspace as safe for git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/.github/wiki"

      - name: Prepare wiki publish branch from preview branch
        id: prepare_publish
        working-directory: .github/wiki
        run: |
          git fetch origin "${WIKI_PUBLISH_BRANCH}" "${WIKI_PREVIEW_BRANCH}"
          expected_preview_sha="$(git rev-parse "origin/${WIKI_PREVIEW_BRANCH}")"
          echo "expected_preview_sha=${expected_preview_sha}" >> "$GITHUB_OUTPUT"
          echo "Expected wiki preview SHA: ${expected_preview_sha}"

          git switch -C "${WIKI_PUBLISH_BRANCH}" --track "origin/${WIKI_PUBLISH_BRANCH}" || git switch "${WIKI_PUBLISH_BRANCH}"
          git reset --hard "origin/${WIKI_PREVIEW_BRANCH}"
          git clean -fd

      - name: Push wiki publish branch
        working-directory: .github/wiki
        run: git push --force-with-lease origin HEAD:"${WIKI_PUBLISH_BRANCH}"

      - name: Validate wiki publish branch
        working-directory: .github/wiki
        env:
          EXPECTED_PREVIEW_SHA: ${{ steps.prepare_publish.outputs.expected_preview_sha }}
        run: |
          actual_publish_sha="$(git ls-remote origin "refs/heads/${WIKI_PUBLISH_BRANCH}" | awk '{print $1}')"

          echo "Expected wiki publish SHA: ${EXPECTED_PREVIEW_SHA}"
          echo "Actual wiki publish SHA: ${actual_publish_sha}"

          if [ -z "${actual_publish_sha}" ]; then
            echo "Remote wiki publish branch ${WIKI_PUBLISH_BRANCH} was not found after push." >&2
            exit 1
          fi

          if [ "${actual_publish_sha}" != "${EXPECTED_PREVIEW_SHA}" ]; then
            echo "Remote wiki publish branch ${WIKI_PUBLISH_BRANCH} does not match preview branch ${WIKI_PREVIEW_BRANCH}." >&2
            exit 1
          fi

      - name: Delete wiki preview branch
        working-directory: .github/wiki
        run: |
          if git ls-remote --exit-code --heads origin "${WIKI_PREVIEW_BRANCH}" >/dev/null 2>&1; then
            git push origin --delete "${WIKI_PREVIEW_BRANCH}"
          else
            echo "Wiki preview branch ${WIKI_PREVIEW_BRANCH} does not exist. Nothing to delete."
          fi

  cleanup_closed_preview:
    name: Delete Closed PR Wiki Preview
    if: github.event_name == 'pull_request_target' && github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      WIKI_PREVIEW_BRANCH: pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          ref: main
          submodules: recursive
          fetch-depth: 0

      - name: Mark wiki workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE/.github/wiki"

      - name: Delete wiki preview branch
        working-directory: .github/wiki
        run: |
          if git ls-remote --exit-code --heads origin "${WIKI_PREVIEW_BRANCH}" >/dev/null 2>&1; then
            git push origin --delete "${WIKI_PREVIEW_BRANCH}"
          else
            echo "Wiki preview branch ${WIKI_PREVIEW_BRANCH} does not exist. Nothing to delete."
          fi

  cleanup_orphaned_previews:
    name: Delete Orphaned Wiki Previews
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          ref: main
          submodules: recursive
          fetch-depth: 0

      - name: Mark wiki workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE/.github/wiki"

      - name: Delete wiki branches for closed pull requests
        working-directory: .github/wiki
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin '+refs/heads/pr-*:refs/remotes/origin/pr-*' || true

          git for-each-ref --format='%(refname:short)' refs/remotes/origin/pr-* | while read -r remote_branch; do
            branch="${remote_branch#origin/}"
            pull_request_number="${branch#pr-}"

            if ! [[ "${pull_request_number}" =~ ^[0-9]+$ ]]; then
              echo "Skipping non-PR wiki preview branch ${branch}."
              continue
            fi

            state="$(gh pr view "${pull_request_number}" --repo "${GITHUB_REPOSITORY}" --json state --jq '.state' 2>/dev/null || echo UNKNOWN)"

            case "${state}" in
              CLOSED|MERGED)
                echo "Deleting wiki preview branch ${branch} for ${state} pull request #${pull_request_number}."
                git push origin --delete "${branch}" || true
                ;;
              OPEN)
                echo "Keeping wiki preview branch ${branch} for open pull request #${pull_request_number}."
                ;;
              *)
                echo "Could not resolve pull request #${pull_request_number} for wiki preview branch ${branch}. Keeping it."
                ;;
            esac
          done
