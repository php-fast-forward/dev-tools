name: Resolve Pull Request Project Status
description: Resolve the target project status for a pull request and its linked issue.

outputs:
  pull-request-status:
    description: Target project status for the pull request.
    value: ${{ steps.resolve.outputs.pull-request-status }}
  linked-issue-node-id:
    description: GraphQL node id for the linked issue, when present.
    value: ${{ steps.resolve.outputs.linked-issue-node-id }}
  linked-issue-status:
    description: Target project status for the linked issue, when present.
    value: ${{ steps.resolve.outputs.linked-issue-status }}

runs:
  using: composite
  steps:
    - id: resolve
      uses: actions/github-script@v8
      with:
        github-token: ${{ github.token }}
        script: |
          const run = require(`${process.env.GITHUB_ACTION_PATH}/run.cjs`);
          await run({github, context, core});
