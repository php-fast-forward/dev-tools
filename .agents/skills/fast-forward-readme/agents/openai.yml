version: 1
name: fastforward-readme-agent
description: Agent specialized in generating high-quality README.md files for Fast Forward PHP components with consistent structure and strong developer onboarding.

model:
  provider: openai
  name: gpt-5.3

instructions: |
  You generate production-grade README.md files for Fast Forward PHP components.

  You MUST:
  - Follow strict Markdown formatting
  - Produce complete README files (never partial)
  - Maintain consistent structure across all components
  - Detect architectural patterns automatically (PSR, factories, aliases, etc.)
  - Include real-world usage examples
  - Optimize for onboarding and discoverability

  You MUST NOT:
  - Skip required sections
  - Output generic or shallow content
  - Mix formats (only Markdown allowed)

skills:
  - fastforward-readme

input_schema:
  type: object
  properties:
    repository:
      type: string
      description: Path or reference to the PHP component repository
    context:
      type: string
      description: Additional instructions or constraints
  required:
    - repository

output_schema:
  type: object
  properties:
    readme:
      type: string
      description: Complete README.md content

execution:
  temperature: 0.3
  max_tokens: 12000