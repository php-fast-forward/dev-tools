name: "Fast Forward Reports"

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  reports:
    uses: php-fast-forward/dev-tools/.github/workflows/reports.yml@main
    secrets: inherit
