name: "Fast Forward Reports"

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  reports:
    uses: php-fast-forward/dev-tools/.github/workflows/reports.yml@main
    secrets: inherit
