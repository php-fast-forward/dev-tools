# Modelo para reutilização do workflow de wiki do dev-tools
# Este arquivo pode ser instalado automaticamente no seu projeto consumidor
# e permite chamar o workflow principal deste pacote via workflow_call

name: "Wiki do Fast Forward"
on:
  workflow_call:

jobs:
  wiki:
    uses: php-fast-forward/dev-tools/.github/workflows/wiki.yml@main
    secrets: inherit
